<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.mistral.ai; media-src https://cdn.pixabay.com;">
    <title>StartShield — Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div id="app-toast" class="app-toast hidden" role="status" aria-live="polite" aria-atomic="true"></div>

    <div class="app-shell set-shell">

        <!-- Top bar -->
        <header class="topbar">
            <div class="topbar-brand">
                <a href="index.html" class="topbar-link">
                    <span class="topbar-wordmark">StartShield</span>
                </a>
                <span class="topbar-eyebrow">Settings</span>
            </div>
            <div class="topbar-actions">
                <a href="index.html" class="icon-btn" aria-label="Back to focus screen">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                </a>
            </div>
        </header>

        <div class="set-content">

            <!-- ── AI / API ────────────────────────────────── -->
            <section class="set-group card" aria-labelledby="set-api-heading">
                <h2 id="set-api-heading" class="set-group-eyebrow">AI Coach</h2>

                <div class="set-row">
                    <div class="set-row-label">
                        <label for="api-key-input" class="set-label">Mistral API key</label>
                        <p class="set-hint">Stored in memory only — never written to disk.</p>
                    </div>
                    <div class="set-row-control set-api-control">
                        <input type="password" id="api-key-input" class="set-input" placeholder="sk-…" autocomplete="off" aria-describedby="api-hint">
                        <button type="button" class="btn-set" onclick="saveApiKey()">Save</button>
                    </div>
                </div>
            </section>

            <!-- ── Appearance ─────────────────────────────── -->
            <section class="set-group card" aria-labelledby="set-appearance-heading">
                <h2 id="set-appearance-heading" class="set-group-eyebrow">Appearance</h2>

                <div class="set-row set-row-divider">
                    <label for="theme-select" class="set-label">Theme</label>
                    <select id="theme-select" class="set-select" onchange="changeTheme(this.value)" aria-label="Choose theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
            </section>

            <!-- ── Sound ──────────────────────────────────── -->
            <section class="set-group card" aria-labelledby="set-sound-heading">
                <h2 id="set-sound-heading" class="set-group-eyebrow">Ambient sound</h2>

                <div class="set-row set-row-divider">
                    <label for="ambient-sound" class="set-label">Sound</label>
                    <select id="ambient-sound" class="set-select" onchange="changeAmbientSound(this.value)">
                        <option value="none">Silence</option>
                        <option value="rain">Rain</option>
                        <option value="cafe">Café</option>
                        <option value="white-noise">White noise</option>
                        <option value="forest">Forest</option>
                    </select>
                </div>

                <div class="set-row">
                    <label for="ambient-volume" class="set-label">Volume</label>
                    <div class="set-volume-row">
                        <input type="range" id="ambient-volume" class="set-range" min="0" max="100" value="50" aria-label="Volume" onchange="changeVolume(this.value)">
                        <span id="volume-display" class="set-volume-label">50%</span>
                    </div>
                </div>
            </section>

            <!-- ── Notifications ──────────────────────────── -->
            <section class="set-group card" aria-labelledby="set-notif-heading">
                <h2 id="set-notif-heading" class="set-group-eyebrow">Notifications</h2>

                <div class="set-row">
                    <div class="set-row-label">
                        <span class="set-label" id="notif-label">Session alerts</span>
                        <p class="set-hint">Browser notifications when a session ends.</p>
                    </div>
                    <label class="set-toggle" aria-labelledby="notif-label">
                        <input type="checkbox" id="notifications-toggle" checked role="switch" aria-checked="true">
                        <span class="set-toggle-track" aria-hidden="true">
                            <span class="set-toggle-thumb"></span>
                        </span>
                        <span class="sr-only">Enable session notifications</span>
                    </label>
                </div>
            </section>

            <!-- ── About ──────────────────────────────────── -->
            <section class="set-group card" aria-labelledby="set-about-heading">
                <h2 id="set-about-heading" class="set-group-eyebrow">About</h2>

                <div class="set-row set-row-divider">
                    <span class="set-label">Version</span>
                    <span class="set-value">1.0.0</span>
                </div>
                <div class="set-row set-row-divider">
                    <span class="set-label">Source code</span>
                    <a href="https://github.com/navybrown1/startshield-adhd-app" target="_blank" rel="noopener" class="set-link">GitHub</a>
                </div>
                <div class="set-row">
                    <span class="set-label">Feedback</span>
                    <a href="https://github.com/navybrown1/startshield-adhd-app/issues" target="_blank" rel="noopener" class="set-link">Open an issue</a>
                </div>
            </section>

        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
